<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Сървъри</title>

    <link rel="stylesheet" type="text/css"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .menu-buttons {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .center-box {
            width: 420px;
            margin: 120px auto;
            padding: 35px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            color: white;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .title {
            font-size: 30px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 16px;
            margin-bottom: 25px;
            color: #ddd;
        }

        .server-button {
            width: 100%;
            margin-top: 12px;
        }
    </style>
</h:head>

<h:body>
    <div class="container">

        <div class="menu-buttons">
            <h:form>
                <p:commandButton value="Табло" icon="ui-icon ui-icon-gear"
                                 action="/secured/dashboard?faces-redirect=true"/>

                <p:commandButton value="Събития с високо натоварване" icon="ui-icon ui-icon-alert"
                                 action="/secured/peaks?faces-redirect=true"/>

                <p:commandButton value="Изход" icon="ui-icon ui-icon-power"
                                 action="#{loginBean.doLogout}"/>
            </h:form>
        </div>
    </div>
    <div class="overlay"></div>

    <div class="center-box">
        <div class="title">Създаване на сървъри</div>
        <div class="subtitle">Изберете тип сървър за създаване</div>

        <h:form id="form">

            <p:commandButton value="Създай Apache"
                             icon="ui-icon-plus"
                             action="#{monitorBean.createApache}"
                             ajax="false"/>

            <p:commandButton value="Създай Nginx"
                             icon="ui-icon-plus"
                             action="#{monitorBean.createNginx}"
                             ajax="false"/>

            <hr style="margin: 25px 0; border-color: rgba(255,255,255,0.3);" />

            <!-- 🔥 Търсене на сървър -->
            <p:inputText value="#{monitorBean.selectedServerName}"
                         placeholder="Въведете име на сървър"
                         style="width:100%; margin-bottom:10px;" />

            <p:commandButton value="Намери сървър"
                             icon="ui-icon-search"
                             action="#{monitorBean.goToServer}"
                             ajax="false"/>

        </h:form>
    </div>
</h:body>
</html>
