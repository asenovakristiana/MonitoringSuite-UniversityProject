<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Вход в системата</title>

    <!-- Зареждаме FontAwesome за икони -->
    <link rel="stylesheet" type="text/css"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 380px;
            margin: 120px auto;
            padding: 35px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            color: white;
            text-align: center;
        }

        .title {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 16px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .input-icon {
            margin-right: 8px;
        }

        .login-field {
            width: 100%;
            margin-bottom: 20px;
        }

        .login-button {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</h:head>

<h:body>
    <div class="overlay"></div>

    <div class="login-box">
        <div class="title">Мониторинг система</div>
        <div class="subtitle">Въведете вашите данни за достъп</div>

        <h:form>
            <div class="login-field">
                <i class="fa fa-user input-icon"></i>
                <p:inputText value="#{loginBean.username}" placeholder="Потребителско име"
                             style="width: 85%;" />
            </div>

            <div class="login-field">
                <i class="fa fa-lock input-icon"></i>
                <p:password value="#{loginBean.password}" placeholder="Парола"
                            style="width: 85%;" />
            </div>

            <p:commandButton value="Вход" icon="ui-icon-key"
                             styleClass="ui-button-success login-button"
                             action="#{loginBean.doLogin}" />
        </h:form>
    </div>
</h:body>
</html>
